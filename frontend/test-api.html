<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 测试页面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        .test-item {
            background: #f8f9fa;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .test-item h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .test-url {
            background: #e9ecef;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin: 10px 0;
            word-break: break-all;
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .result pre {
            margin-top: 10px;
            background: white;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            max-height: 300px;
            font-size: 12px;
        }
        .status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .status.pending { background: #ffc107; color: #000; }
        .status.success { background: #28a745; color: white; }
        .status.failed { background: #dc3545; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Claude Skills API 测试</h1>

        <!-- 测试 1: 健康检查 -->
        <div class="test-item">
            <h3>1️⃣ 健康检查</h3>
            <div class="test-url">GET https://api.liguoqi.site/health</div>
            <button class="btn" onclick="testHealth()">运行测试</button>
            <div id="health-result" class="result"></div>
        </div>

        <!-- 测试 2: 分类列表 -->
        <div class="test-item">
            <h3>2️⃣ 分类列表 API</h3>
            <div class="test-url">GET https://api.liguoqi.site/api/skills/categories/list</div>
            <button class="btn" onclick="testCategories()">运行测试</button>
            <div id="categories-result" class="result"></div>
        </div>

        <!-- 测试 3: 技能列表 -->
        <div class="test-item">
            <h3>3️⃣ 技能列表 API</h3>
            <div class="test-url">GET https://api.liguoqi.site/api/skills/?page=1&page_size=5</div>
            <button class="btn" onclick="testSkills()">运行测试</button>
            <div id="skills-result" class="result"></div>
        </div>

        <!-- 测试 4: 技能详情 -->
        <div class="test-item">
            <h3>4️⃣ 技能详情 API</h3>
            <div class="test-url">GET https://api.liguoqi.site/api/skills/1</div>
            <button class="btn" onclick="testDetail()">运行测试</button>
            <div id="detail-result" class="result"></div>
        </div>

        <!-- 一键测试全部 -->
        <div style="text-align: center; margin-top: 30px;">
            <button class="btn" style="padding: 15px 40px; font-size: 16px;" onclick="testAll()">
                🚀 一键测试全部
            </button>
        </div>
    </div>

    <script>
        const API_BASE = 'https://api.liguoqi.site';

        function showResult(elementId, success, message, data = null) {
            const el = document.getElementById(elementId);
            el.className = success ? 'result success' : 'result error';

            let html = `<strong>${success ? '✅ 成功' : '❌ 失败'}</strong>: ${message}`;

            if (data) {
                html += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            }

            el.innerHTML = html;
        }

        async function testHealth() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '测试中...';

            try {
                const response = await fetch(`${API_BASE}/health`);
                const text = await response.text();

                if (response.ok && text.includes('OK')) {
                    showResult('health-result', true, '服务健康检查通过', { response: text });
                } else {
                    showResult('health-result', false, '服务健康检查失败', { status: response.status, body: text });
                }
            } catch (error) {
                showResult('health-result', false, error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '运行测试';
            }
        }

        async function testCategories() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '测试中...';

            try {
                const response = await fetch(`${API_BASE}/api/skills/categories/list`);
                const data = await response.json();

                if (response.ok && data.categories && data.categories.length > 0) {
                    showResult('categories-result', true, `获取到 ${data.categories.length} 个分类`, data);
                } else {
                    showResult('categories-result', false, '获取分类失败', data);
                }
            } catch (error) {
                showResult('categories-result', false, error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '运行测试';
            }
        }

        async function testSkills() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '测试中...';

            try {
                const response = await fetch(`${API_BASE}/api/skills/?page=1&page_size=5`);
                const data = await response.json();

                if (response.ok && data.items && data.items.length > 0) {
                    showResult('skills-result', true,
                        `获取到技能列表（总数: ${data.total}，当前页: ${data.items.length} 个）`,
                        { total: data.total, page: data.page, skills: data.items.slice(0, 2) }
                    );
                } else {
                    showResult('skills-result', false, '获取技能列表失败', data);
                }
            } catch (error) {
                showResult('skills-result', false, error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '运行测试';
            }
        }

        async function testDetail() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '测试中...';

            try {
                const response = await fetch(`${API_BASE}/api/skills/1`);
                const data = await response.json();

                if (response.ok && data.id) {
                    showResult('detail-result', true, `获取到技能详情: ${data.name}`, {
                        id: data.id,
                        name: data.name,
                        author: data.author,
                        stars: data.stars,
                        category: data.category
                    });
                } else {
                    showResult('detail-result', false, '获取技能详情失败', data);
                }
            } catch (error) {
                showResult('detail-result', false, error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '运行测试';
            }
        }

        async function testAll() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '测试中...';

            await testHealth();
            await new Promise(r => setTimeout(r, 500));
            await testCategories();
            await new Promise(r => setTimeout(r, 500));
            await testSkills();
            await new Promise(r => setTimeout(r, 500));
            await testDetail();

            btn.disabled = false;
            btn.textContent = '🚀 一键测试全部';
        }
    </script>
</body>
</html>
